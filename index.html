<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaGen | Caption & Hashtag Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .insta-gradient {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="p-4 bg-white shadow-sm border-b">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold insta-gradient bg-clip-text text-transparent">
                <i class="fab fa-instagram mr-2 text-pink-600"></i>InstaGen
            </h1>
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest">AI Social Tool</span>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6">
        
        <section class="mb-8">
            <div class="bg-white rounded-2xl p-6 shadow-xl border border-gray-100">
                <label class="block text-sm font-semibold text-gray-700 mb-2">What is your post about?</label>
                <input type="text" id="userInput" 
                       placeholder="e.g., travel, food, fitness, coffee..." 
                       class="w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none transition-all mb-4">
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="generateCaptions()" class="insta-gradient text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:opacity-90 transition-all flex items-center justify-center">
                        <i class="fas fa-magic mr-2"></i> Captions
                    </button>
                    <button onclick="generateHashtags()" class="bg-gray-800 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:bg-black transition-all flex items-center justify-center">
                        <i class="fas fa-hashtag mr-2"></i> Hashtags
                    </button>
                </div>
            </div>
        </section>

        <section id="resultsArea" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 id="resultTitle" class="text-xl font-bold text-gray-800">Your Results</h2>
                <button onclick="clearAll()" class="text-sm text-pink-600 font-semibold hover:underline">Try Again</button>
            </div>

            <div id="suggestionsList" class="space-y-4">
                </div>
        </section>

        <section id="emptyState" class="text-center py-20">
            <div class="text-6xl mb-4">✨</div>
            <h3 class="text-lg font-medium text-gray-500">Enter a keyword to start creating!</h3>
        </section>

    </main>

    <script>
        // Data Dictionary for local generation
        const database = {
            travel: {
                captions: ["Catch flights, not feelings.", "Adventure is out there.", "Work, travel, repeat.", "Lost in the right direction.", "Collect moments, not things."],
                tags: ["#travelgram", "#wanderlust", "#explore", "#vacation", "#travelblogger", "#globetrotter", "#adventure", "#nature", "#sunset", "#trip"]
            },
            food: {
                captions: ["First I eat, then I do things.", "Good food, good mood.", "Eyes on the fries.", "Life is uncertain. Eat dessert first.", "Made with love and extra cheese."],
                tags: ["#foodie", "#instafood", "#delicious", "#yummy", "#foodporn", "#chef", "#dinner", "#healthyfood", "#foodstagram", "#brunch"]
            },
            fitness: {
                captions: ["Sweat is just fat crying.", "No pain, no gain.", "Don't stop when you're tired. Stop when you're done.", "Earned, not given.", "Stronger than yesterday."],
                tags: ["#fitnessmotivation", "#gymlife", "#workout", "#healthylifestyle", "#fitfam", "#training", "#bodybuilding", "#goals", "#active", "#nopainnogain"]
            },
            funny: {
                captions: ["I’m not lazy, I’m on energy-saving mode.", "Reality called, so I hung up.", "Life is short. Smile while you still have teeth.", "Maybe she's born with it, maybe it's an Instagram filter.", "Friday, my second favorite F word."],
                tags: ["#funny", "#memes", "#humor", "#relatable", "#laugh", "#comedy", "#jokes", "#instafunny", "#lol", "#sarcasm"]
            },
            cute: {
                captions: ["Stay golden.", "Sunshine mixed with a little hurricane.", "Sweeter than honey.", "Choose kindness and laugh often.", "Little things mean the most."],
                tags: ["#cute", "#aesthetic", "#happy", "#smile", "#love", "#vibes", "#photography", "#beautiful", "#sweet", "#me"]
            },
            default: {
                captions: ["Living my best life.", "Normal is boring.", "Selfie Sunday.", "The best is yet to come.", "Making history."],
                tags: ["#instagood", "#picoftheday", "#viral", "#trending", "#life", "#style", "#foryou", "#reels", "#explorepage", "#newpost"]
            }
        };

        // UI Logic
        function generateCaptions() {
            const input = document.getElementById('userInput').value.toLowerCase().trim();
            if (!input) return alert("Please enter a topic!");

            // Find match or use default
            const category = database[input] || database.default;
            displayResults(category.captions, "Captions");
        }

        function generateHashtags() {
            const input = document.getElementById('userInput').value.toLowerCase().trim();
            if (!input) return alert("Please enter a topic!");

            const category = database[input] || database.default;
            // For hashtags, we can display them as one block or a list
            displayResults([category.tags.join(' ')], "Hashtags");
        }

        function displayResults(items, type) {
            const list = document.getElementById('suggestionsList');
            const area = document.getElementById('resultsArea');
            const empty = document.getElementById('emptyState');
            
            list.innerHTML = ''; // Clear previous
            document.getElementById('resultTitle').innerText = `Your ${type}`;
            
            items.forEach(text => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex justify-between items-center group hover:border-pink-200 transition-colors";
                card.innerHTML = `
                    <p class="text-gray-700 pr-4">${text}</p>
                    <button onclick="copyToClipboard('${text}', this)" class="bg-gray-100 p-2 rounded-lg text-gray-500 hover:bg-pink-100 hover:text-pink-600 transition-all">
                        <i class="far fa-copy"></i>
                    </button>
                `;
                list.appendChild(card);
            });

            area.classList.remove('hidden');
            empty.classList.add('hidden');
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            
            // Visual feedback
            const icon = btn.querySelector('i');
            icon.classList.replace('fa-copy', 'fa-check');
            btn.classList.add('bg-green-100', 'text-green-600');
            
            setTimeout(() => {
                icon.classList.replace('fa-check', 'fa-copy');
                btn.classList.remove('bg-green-100', 'text-green-600');
            }, 2000);
        }

        function clearAll() {
            document.getElementById('userInput').value = '';
            document.getElementById('resultsArea').classList.add('hidden');
            document.getElementById('emptyState').classList.remove('hidden');
        }
    </script>
</body>
</html>
